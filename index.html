<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주현미 연대기 — 트로트의 여왕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f1eb;--bg2:#ece8df;--bg3:#e2ddd3;
  --tx:#1a1714;--tx2:#3a3630;--tx3:#7a7268;
  --bd:#ccc7bc;--bd2:#d9d5cc;
  --acc:#7a3b10;--line:#c8a882;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1916;--bg2:#252119;--bg3:#2f2b22;
  --tx:#ede8df;--tx2:#b8b2a6;--tx3:#6e6860;
  --bd:#3c3830;--bd2:#2f2b22;
  --acc:#d08850;--line:#8a6a48;
}}
html,body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-weight:400;min-height:100vh;font-size:15px;line-height:1.75}
#app{max-width:900px;margin:0 auto;padding-bottom:100px}

/* HERO */
.hero{background:var(--bg2);border-bottom:1px solid var(--bd);overflow:hidden}
.hero-inner{display:flex;align-items:stretch;min-height:260px}
.hero-photo{flex-shrink:0;width:190px;position:relative;overflow:hidden;background:#e8e4dc}
.hero-photo img{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:auto;display:block}
.hero-text{flex:1;padding:36px 36px 32px 28px;display:flex;flex-direction:column;justify-content:center}
.hero-badge{font-size:10px;letter-spacing:.26em;color:var(--tx3);text-transform:uppercase;font-weight:300;margin-bottom:14px}
.hero h1{font-size:clamp(38px,6vw,60px);font-weight:300;letter-spacing:.04em;color:var(--tx);line-height:1.05;font-family:'Noto Serif KR',serif;margin-bottom:6px}
.hero-romanized{font-size:12px;color:var(--tx3);letter-spacing:.16em;font-weight:300;margin-bottom:16px}
.hero-meta{font-size:13px;color:var(--tx2);line-height:2;font-weight:300}
.hero-meta b{color:var(--acc);font-weight:500}
.deco{display:flex;align-items:center;gap:8px;margin:12px 0}
.deco hr{border:none;border-top:.5px solid var(--bd);flex:1}
.deco-dot{width:3px;height:3px;border-radius:50%;background:var(--tx3);opacity:.5}

/* SECTION */
.sec{padding:30px 32px 26px;border-bottom:1px solid var(--bd)}
.sec-title{font-size:10px;letter-spacing:.24em;color:var(--tx3);text-transform:uppercase;font-weight:400;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.sec-title::after{content:'';flex:1;border-top:.5px solid var(--bd)}

/* TODAY */
.p-badge{display:inline-block;font-size:10px;letter-spacing:.12em;padding:3px 10px;margin-bottom:14px;font-weight:500}
.p1{background:var(--acc);color:#fff}
.p2{border:.5px solid var(--bd);color:var(--tx2)}
.p3{border:.5px solid var(--bd2);color:var(--tx3)}
.today-song{font-size:clamp(26px,4.5vw,38px);font-weight:300;color:var(--tx);margin-bottom:6px;font-family:'Noto Serif KR',serif}
.today-info{font-size:13px;color:var(--tx3);margin-bottom:16px;line-height:1.8}
.today-lyric{font-size:15px;color:var(--tx2);font-style:italic;line-height:1.9;border-left:2px solid var(--acc);padding-left:16px;margin-bottom:14px;font-family:'Noto Serif KR',serif}
.today-album{font-size:13px;color:var(--tx3);margin-bottom:16px}
.link-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0}
.mlink{font-size:13px;color:var(--tx2);border:.5px solid var(--bd);padding:7px 16px;text-decoration:none;font-weight:400;transition:border-color .15s,color .15s}
.mlink:hover{border-color:var(--acc);color:var(--acc)}
.today-embed-area{margin-top:18px}
.today-embed-loading{font-size:13px;color:var(--tx3);padding:10px 0}

/* VIDEO */
.video-frame{position:relative;width:100%;padding-bottom:56.25%;background:var(--bg3)}
.video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-skeleton{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--tx3)}

/* COVER */
.cover-wrap{border-top:.5px solid var(--bd2);margin-top:28px;padding-top:24px}
.cover-label{font-size:10px;letter-spacing:.22em;color:var(--tx3);text-transform:uppercase;font-weight:400;margin-bottom:14px}
.video-meta{margin-top:12px;font-size:14px;color:var(--tx2);line-height:1.6}
.cover-footer{display:flex;align-items:center;gap:14px;margin-top:12px}
.cover-btn{font-size:13px;background:none;border:.5px solid var(--bd);color:var(--tx2);padding:7px 18px;cursor:pointer;font-weight:400;transition:all .15s}
.cover-btn:hover{border-color:var(--acc);color:var(--acc)}
.cover-info{font-size:12px;color:var(--tx3)}
.cover-err{font-size:13px;color:var(--tx3);font-style:italic;padding:10px 0}

/* SEARCH + FILTER */
.search-wrap{padding:18px 32px 0}
.search-input{width:100%;padding:10px 16px;font-size:14px;font-family:'Noto Serif KR',serif;border:.5px solid var(--bd);background:var(--bg);color:var(--tx);outline:none;transition:border-color .15s}
.search-input::placeholder{color:var(--tx3)}
.search-input:focus{border-color:var(--acc)}
.filter-bar{display:flex;overflow-x:auto;border-bottom:1px solid var(--bd);padding:0 32px;margin-top:4px}
.fbtn{background:none;border:none;border-bottom:2px solid transparent;padding:12px 14px;font-size:12px;color:var(--tx3);cursor:pointer;font-weight:400;white-space:nowrap;margin-bottom:-1px;transition:color .15s}
.fbtn:hover{color:var(--tx2)}
.fbtn.on{color:var(--tx);border-bottom-color:var(--acc);font-weight:500}

/* TIMELINE */
.timeline{padding:0 32px}
.era-group{padding:28px 0 0}
.era-label{font-size:10px;letter-spacing:.22em;color:var(--tx3);text-transform:uppercase;font-weight:400;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.era-label::after{content:'';flex:1;border-top:.5px solid var(--bd2)}
.tl-item{display:grid;grid-template-columns:68px 1px 1fr;gap:0 18px;cursor:pointer;padding:3px 6px;border-radius:3px;transition:background .12s}
.tl-item:hover{background:var(--bg2)}
.item-yr{font-size:21px;font-weight:300;color:var(--tx);opacity:.14;text-align:right;padding-top:6px;line-height:1;align-self:start;transition:opacity .2s}
.tl-item:hover .item-yr,.tl-item.open .item-yr{opacity:.5}
.item-spine{display:flex;flex-direction:column;align-items:center}
.spine-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--bd);background:var(--bg);flex-shrink:0;margin-top:11px;transition:all .2s}
.tl-item:hover .spine-dot,.tl-item.open .spine-dot{border-color:var(--acc);background:var(--acc)}
.spine-line{width:.5px;flex:1;background:var(--bd2);min-height:32px}
.item-body{padding:5px 0 20px}
.item-tag{font-size:9px;letter-spacing:.12em;color:var(--tx3);border:.5px solid var(--bd2);padding:2px 7px;text-transform:uppercase;font-weight:400;margin-bottom:6px;display:inline-block}
.item-tag.hit{border-color:var(--acc);color:var(--acc)}
.item-tag.award{border-color:var(--line);color:var(--tx2)}
.item-title{font-size:16px;font-weight:500;color:var(--tx);line-height:1.3;margin-bottom:3px}
.item-sub{font-size:12.5px;color:var(--tx3);font-weight:400}
.item-detail{max-height:0;overflow:hidden;transition:max-height .35s ease}
.tl-item.open .item-detail{max-height:400px}
.detail-in{padding-top:12px;padding-bottom:4px}
.detail-desc{font-size:14px;color:var(--tx2);font-weight:400;line-height:1.95;border-left:1.5px solid var(--bd2);padding-left:14px;margin-bottom:12px}
.detail-links{display:flex;gap:8px;flex-wrap:wrap}

/* GUESTBOOK */
.gb-form{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.gb-row{display:flex;gap:10px}
.gb-input,.gb-sel,.gb-ta{font-family:'Noto Serif KR',serif;font-weight:400;font-size:14px;border:.5px solid var(--bd);background:var(--bg);color:var(--tx);padding:9px 14px;outline:none;transition:border-color .15s;width:100%}
.gb-input:focus,.gb-sel:focus,.gb-ta:focus{border-color:var(--acc)}
.gb-input::placeholder,.gb-ta::placeholder{color:var(--tx3)}
.gb-input{flex:1;min-width:0}
.gb-sel{flex:1;min-width:0;cursor:pointer}
.gb-ta{resize:vertical;min-height:72px}
.gb-btn{align-self:flex-end;padding:9px 22px;font-size:13px;font-weight:400;background:none;border:.5px solid var(--bd);color:var(--tx2);cursor:pointer;transition:all .15s}
.gb-btn:hover{border-color:var(--acc);color:var(--acc)}
.gb-list{display:flex;flex-direction:column;gap:16px}
.gb-entry{border-left:1.5px solid var(--bd2);padding:8px 0 8px 16px}
.gb-head{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:5px}
.gb-name{font-size:14px;font-weight:500;color:var(--tx)}
.gb-song{font-size:11px;color:var(--acc);border:.5px solid var(--bd2);padding:1px 8px}
.gb-date{font-size:11px;color:var(--tx3);margin-left:auto}
.gb-msg{font-size:14px;color:var(--tx2);font-weight:400;line-height:1.8;font-style:italic}
.gb-empty{font-size:13px;color:var(--tx3);font-style:italic;text-align:center;padding:20px 0}

@media(max-width:580px){
  .hero-inner{flex-direction:column}
  .hero-photo{width:100%;height:220px}
  .hero-photo img{position:static;transform:none;width:100%;height:220px;object-fit:cover;object-position:top center}
  .hero-text{padding:24px 20px 28px}
  .sec,.timeline,.filter-bar,.search-wrap{padding-left:16px;padding-right:16px}
  .gb-row{flex-direction:column}
}
</style>
</head>

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
let covers = []; // 서버에서 받아온 영상 목록 저장용

async function loadCovers() {
  try {
    // 1. Vercel 서버리스 함수(/api/covers)에 데이터 요청
    const res = await fetch('/api/covers');

    if (!res.ok) {
      const errData = await res.json();
      throw new Error(errData.error || '서버 응답 오류');
    }

    covers = await res.json(); // [{id, title}, ...] 형태의 배열

    if (covers && covers.length > 0) {
      // 2. 가져온 목록 중 랜덤하게 하나 선택 (새로고침 시 매번 바뀜)
      const randomIdx = Math.floor(Math.random() * covers.length);
      showCover(randomIdx);

      // '다른 노래 추천' 버튼 활성화
      const btn = document.getElementById('cover-next-btn');
      if (btn) btn.disabled = false;
    } else {
      throw new Error('검색된 영상이 없습니다.');
    }
  } catch (e) {
    console.error('API 에러:', e);
    const errEl = document.getElementById('cover-err');
    if (errEl) errEl.textContent = '영상을 불러오지 못했습니다: ' + e.message;
    const skel = document.getElementById('cover-skeleton');
    if (skel) skel.style.display = 'none';
  }
}

// 특정 인덱스의 영상을 화면에 표시
function showCover(idx) {
  const v = covers[idx];
  const iframe   = document.getElementById('cover-iframe');
  const skeleton = document.getElementById('cover-skeleton');
  const titleEl  = document.getElementById('cover-title');
  const infoEl   = document.getElementById('cover-info');

  if (skeleton) skeleton.style.display = 'none';
  if (iframe) {
    iframe.src = `https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1&autoplay=0`;
    iframe.style.opacity = '1';
  }
  if (titleEl) titleEl.textContent = v.title;
  if (infoEl)  infoEl.textContent  = `오늘의 추천 영상 (${idx + 1} / ${covers.length})`;
}

// '다른 노래 보기' 버튼 클릭 시 — 중복 없이 순환
let shownIdxSet = new Set();
function nextCover() {
  if (covers.length === 0) return;
  // 전부 봤으면 초기화
  if (shownIdxSet.size >= covers.length) shownIdxSet.clear();
  // 아직 안 본 것 중 랜덤
  let next;
  do { next = Math.floor(Math.random() * covers.length); }
  while (shownIdxSet.has(next));
  shownIdxSet.add(next);
  showCover(next);
}

// 페이지 로드 시 실행
loadCovers();

/* TODAY 우선순위 로직 */

async function loadTodayVideo(title) {
  const area = document.getElementById('today-embed-area');
  if (!area) return;
  area.innerHTML = '<div class="today-embed-loading">영상 불러오는 중...</div>';
  try {
    const q = encodeURIComponent('주현미 ' + title);
    const r = await fetch('/api/today-video?q=' + q);
    if (!r.ok) throw new Error();
    const d = await r.json();
    if (!d.id) throw new Error();
    area.innerHTML =
      '<div class="video-frame"><iframe src="https://www.youtube.com/embed/' + d.id +
      '?rel=0&modestbranding=1" allowfullscreen loading="lazy" ' +
      'allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture">' +
      '</iframe></div>';
  } catch (e) {
    area.innerHTML = '';
  }
}

function initToday() {
  const now = new Date(), tm = now.getMonth() + 1, td = now.getDate();
  const valid = SONGS.filter(s => s.month && s.day);

  function dist(s) {
    const raw = Math.abs((s.month - tm) * 30 + (s.day - td));
    return Math.min(raw, 365 - raw);
  }

  let pick = null, prio = 0, minD = 9999, closest = null;
  for (const s of valid) {
    const d = dist(s);
    if (d < minD) { minD = d; closest = s; }
    const exact = s.month === tm && s.day === td;
    if      (exact          && prio < 3) { pick = s; prio = 3; }
    else if (d <= 7         && prio < 2) { pick = s; prio = 2; }
    else if (s.month === tm && prio < 1) { pick = s; prio = 1; }
  }
  if (!pick) { pick = closest; prio = 0; }

  const ago = now.getFullYear() - pick.year;
  const mm  = String(pick.month).padStart(2,'0');
  const dd  = String(pick.day).padStart(2,'0');
  const labels = { 3:'★ 오늘 날짜 일치', 2:'이번 주 (7일 이내)', 1:'이번 달', 0:'가장 가까운 날짜' };
  const cls    = { 3:'p1', 2:'p2', 1:'p3', 0:'p3' };
  const ytQ    = encodeURIComponent('주현미 ' + pick.title);

  let html = '<span class="p-badge ' + cls[prio] + '">' + labels[prio] + '</span>';
  html += '<div class="today-song">〈' + pick.title + '〉</div>';
  html += '<div class="today-info">발매일 ' + pick.year + '.' + mm + '.' + dd + ' &nbsp;/&nbsp; ' + ago + '년 전</div>';
  if (pick.lyric) html += '<div class="today-lyric">❝ ' + pick.lyric + ' ❞</div>';
  if (pick.album) html += '<div class="today-album">📀 ' + pick.album + '</div>';
  html += '<div class="link-row" style="margin-bottom:14px">';
  html += '<a class="mlink" href="https://www.youtube.com/results?search_query=' + ytQ + '" target="_blank">▶ YouTube에서 검색</a>';
  html += '</div>';
  html += '<div id="today-embed-area" class="today-embed-area"></div>';

  document.getElementById('today-out').innerHTML = html;
  loadTodayVideo(pick.title);
}

let curF = 'all';
const TAG = { album:'앨범', hit:'대표곡', award:'수상/기록' };
const ERA = { '1980s':'1980s', '1990s':'1990s', '2000s':'2000s+' };

function setF(f, btn) {
  curF = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); renderTL();
}
function renderTL() {
  const q = document.getElementById('sq').value.toLowerCase();
  const c = document.getElementById('tl'); c.innerHTML = '';
  ['1980s','1990s','2000s'].forEach(era => {
    const items = TL.filter(d => {
      const mE = curF==='all' || curF===d.type || curF===d.era;
      const mQ = !q || d.title.toLowerCase().includes(q) || String(d.year).includes(q) ||
                 (d.sub||'').toLowerCase().includes(q) || (d.desc||'').toLowerCase().includes(q);
      return mE && mQ && d.era === era;
    });
    if (!items.length) return;
    const g = document.createElement('div'); g.className='era-group';
    g.innerHTML = `<div class="era-label">${ERA[era]}</div>`;
    items.forEach(d => {
      const el = document.createElement('div'); el.className='tl-item';
      el.innerHTML = `
        <div class="item-yr">${d.year}</div>
        <div class="item-spine"><div class="spine-dot"></div><div class="spine-line"></div></div>
        <div class="item-body">
          <span class="item-tag ${d.type}">${TAG[d.type]}</span>
          <div class="item-title">${d.title}</div>
          <div class="item-sub">${d.sub||''}</div>
          <div class="item-detail"><div class="detail-in">
            <div class="detail-desc">${d.desc||''}</div>
            <div class="detail-links">
              ${d.yt?`<a class="mlink" href="${d.yt}" target="_blank">▶ YouTube</a>`:''}
              ${d.ml?`<a class="mlink" href="${d.ml}" target="_blank">♬ 멜론</a>`:''}
            </div>
          </div></div>
        </div>`;
      el.addEventListener('click', () => {
        const was = el.classList.contains('open');
        document.querySelectorAll('.tl-item.open').forEach(e => e.classList.remove('open'));
        if (!was) el.classList.add('open');
      });
      g.appendChild(el);
    });
    c.appendChild(g);
  });
}

/* GUESTBOOK */
const GBK = 'juhyunmi_gb_v4';
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gbL = () => { try { return JSON.parse(localStorage.getItem(GBK)||'[]'); } catch(e){return[];} };
const gbS = a => { try { localStorage.setItem(GBK, JSON.stringify(a)); } catch(e){} };

function gbSubmit() {
  const name = document.getElementById('gb-name').value.trim();
  const song = document.getElementById('gb-song').value;
  const msg  = document.getElementById('gb-msg').value.trim();
  if (!name || !msg) { alert('닉네임과 메시지를 입력해주세요.'); return; }
  const a = gbL();
  a.unshift({ name, song, msg, date: new Date().toLocaleDateString('ko-KR') });
  gbS(a);
  document.getElementById('gb-name').value = '';
  document.getElementById('gb-song').value = '';
  document.getElementById('gb-msg').value  = '';
  renderGB();
}
function renderGB() {
  const w = document.getElementById('gb-list'); const a = gbL();
  if (!a.length) { w.innerHTML='<div class="gb-empty">첫 번째 방명록을 남겨보세요 ✦</div>'; return; }
  w.innerHTML = a.map(e => `
    <div class="gb-entry">
      <div class="gb-head">
        <span class="gb-name">${esc(e.name)}</span>
        ${e.song?`<span class="gb-song">♪ ${esc(e.song)}</span>`:''}
        <span class="gb-date">${e.date}</span>
      </div>
      <div class="gb-msg">${esc(e.msg)}</div>
    </div>`).join('');
}

initToday();
renderTL();
renderGB();
