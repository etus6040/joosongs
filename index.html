<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주현미 연대기 — 트로트의 여왕</title>
<meta property="og:title" content="주현미 연대기 — 트로트의 여왕">
<meta property="og:description" content="1984년부터 2025년까지, 주현미 40년 음악 연대기">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f7f3;--bg2:#f1ede5;--bg3:#e8e3d9;
  --tx:#1c1a16;--tx2:#52504a;--tx3:#9a9690;
  --bd:#dedad2;--bd2:#eae6de;
  --acc:#7a3b10;--line:#c8a882;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#17150f;--bg2:#1f1d16;--bg3:#2a271e;
  --tx:#ede9e0;--tx2:#a8a49a;--tx3:#636058;
  --bd:#3a362c;--bd2:#2a271e;
  --acc:#c8844a;--line:#8a6a48;
}}
html,body{background:var(--bg);color:var(--tx);font-family:'Noto Serif KR',serif;font-weight:400;min-height:100vh;font-size:16.8px;line-height:1.7}
#app{max-width:860px;margin:0 auto;padding-bottom:80px}

/* ── HERO ── */
.hero{text-align:center;padding:44px 24px 32px;border-bottom:1px solid var(--bd)}
.hero-badge{font-size:10.8px;letter-spacing:.28em;color:var(--tx3);text-transform:uppercase;display:inline-block;border:.5px solid var(--bd);padding:3px 14px;margin-bottom:18px;font-family:'Noto Sans KR',sans-serif;font-weight:300}
.hero h1{font-size:clamp(36px,6.5vw,62.4px);font-weight:300;letter-spacing:.04em;color:var(--tx);line-height:1.1}
.hero-romanized{font-size:13.2px;color:var(--tx3);letter-spacing:.14em;margin-top:8px;font-family:'Noto Sans KR',sans-serif;font-weight:300}
.hero-meta{margin-top:14px;font-size:13.2px;color:var(--tx3)}
.deco{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 0 0}
.deco hr{border:none;border-top:.5px solid var(--bd);width:60px}
.deco-dot{width:3px;height:3px;border-radius:50%;background:var(--tx3);opacity:.45}

/* ── SECTION ── */
.sec{padding:28px 28px 24px;border-bottom:1px solid var(--bd)}
.sec.alt{background:var(--bg2)}
.sec-title{font-size:10.8px;letter-spacing:.22em;color:var(--tx3);text-transform:uppercase;font-family:'Noto Sans KR',sans-serif;font-weight:300;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;border-top:.5px solid var(--bd)}

/* ── TODAY ── */
.p-badge{display:inline-block;font-size:10.8px;letter-spacing:.14em;padding:2px 9px;margin-bottom:12px;font-family:'Noto Sans KR',sans-serif;font-weight:400}
.p1{background:var(--acc);color:#fff}
.p2{border:.5px solid var(--bd);color:var(--tx2)}
.p3{border:.5px solid var(--bd2);color:var(--tx3)}
.today-song{font-size:clamp(26.4px,4.5vw,38.4px);font-weight:300;color:var(--tx);margin-bottom:5px}
.today-info{font-size:13.2px;color:var(--tx3);margin-bottom:14px;line-height:1.8}
.today-lyric{font-size:15.6px;color:var(--tx2);font-style:italic;line-height:1.85;border-left:1.5px solid var(--bd);padding-left:14px;margin-bottom:12px}
.today-album{font-size:13.2px;color:var(--tx3);margin-bottom:14px;font-family:'Noto Sans KR',sans-serif;font-weight:300}
.link-row{display:flex;gap:8px;flex-wrap:wrap}
.mlink{font-size:13.2px;color:var(--tx2);border:.5px solid var(--bd);padding:5px 13px;text-decoration:none;font-family:'Noto Sans KR',sans-serif;font-weight:400;transition:border-color .15s,color .15s}
.mlink:hover{border-color:var(--acc);color:var(--acc)}

.today-embed-area{margin-top:14px}
.today-embed-area .video-frame{margin-top:0}
.today-embed-loading{font-size:13.2px;color:var(--tx3);font-family:'Noto Sans KR',sans-serif;font-weight:300;padding:8px 0}

/* ── COVER VIDEO ── */
.cover-wrap{border-top:.5px solid var(--bd2);margin-top:24px;padding-top:22px}
.cover-label{font-size:10.8px;letter-spacing:.2em;color:var(--tx3);text-transform:uppercase;font-family:'Noto Sans KR',sans-serif;font-weight:300;margin-bottom:14px}
.video-frame{position:relative;width:100%;padding-bottom:56.25%;background:var(--bg3)}
.video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-skeleton{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14.4px;color:var(--tx3);font-family:'Noto Sans KR',sans-serif;font-weight:300}
.video-meta{margin-top:10px;font-size:14.4px;color:var(--tx2);font-family:'Noto Sans KR',sans-serif;font-weight:300;line-height:1.5;min-height:18px}
.cover-footer{display:flex;align-items:center;gap:12px;margin-top:10px}
.cover-btn{font-size:13.2px;background:none;border:.5px solid var(--bd);color:var(--tx3);padding:5px 14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:300;transition:all .15s}
.cover-btn:hover{border-color:var(--acc);color:var(--acc)}
.cover-info{font-size:12px;color:var(--tx3);font-family:'Noto Sans KR',sans-serif}
.cover-err{font-size:13.2px;color:var(--tx3);font-style:italic;padding:10px 0}

/* ── SEARCH + FILTER ── */
.search-wrap{padding:16px 28px 0}
.search-input{width:100%;padding:8px 14px;font-size:15.6px;font-family:'Noto Serif KR',serif;font-weight:400;border:.5px solid var(--bd);background:var(--bg);color:var(--tx);outline:none;transition:border-color .15s}
.search-input::placeholder{color:var(--tx3)}
.search-input:focus{border-color:var(--line)}
.filter-bar{display:flex;overflow-x:auto;border-bottom:.5px solid var(--bd);padding:0 28px;margin-top:4px}
.fbtn{background:none;border:none;border-bottom:1.5px solid transparent;padding:10px 13px;font-size:13.2px;color:var(--tx3);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:400;white-space:nowrap;margin-bottom:-1px;transition:color .15s}
.fbtn:hover{color:var(--tx2)}
.fbtn.on{color:var(--tx);border-bottom-color:var(--acc);font-weight:500}

/* ── TIMELINE ── */
.timeline{padding:0 28px}
.era-group{padding:26px 0 0}
.era-label{font-size:10.8px;letter-spacing:.22em;color:var(--tx3);text-transform:uppercase;font-family:'Noto Sans KR',sans-serif;font-weight:300;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.era-label::after{content:'';flex:1;border-top:.5px solid var(--bd2)}
.tl-item{display:grid;grid-template-columns:64px 1px 1fr;gap:0 16px;cursor:pointer;padding:2px 0;border-radius:2px;transition:background .12s}
.tl-item:hover{background:var(--bg2)}
.item-yr{font-size:24px;font-weight:300;color:var(--tx);opacity:.13;text-align:right;padding-top:5px;line-height:1;align-self:start;transition:opacity .2s;font-family:'Noto Sans KR',sans-serif}
.tl-item:hover .item-yr,.tl-item.open .item-yr{opacity:.45}
.item-spine{display:flex;flex-direction:column;align-items:center}
.spine-dot{width:6px;height:6px;border-radius:50%;border:1px solid var(--bd);background:var(--bg);flex-shrink:0;margin-top:10px;transition:all .2s}
.tl-item:hover .spine-dot,.tl-item.open .spine-dot{border-color:var(--acc);background:var(--acc)}
.spine-line{width:.5px;flex:1;background:var(--bd2);min-height:30px}
.item-body{padding:4px 0 18px}
.item-tag{font-size:10.2px;letter-spacing:.12em;color:var(--tx3);border:.5px solid var(--bd2);padding:1.5px 6px;text-transform:uppercase;font-family:'Noto Sans KR',sans-serif;font-weight:300;margin-bottom:5px;display:inline-block}
.item-tag.hit{border-color:var(--acc);color:var(--acc)}
.item-tag.award{border-color:var(--line);color:var(--tx2)}
.item-title{font-size:18px;font-weight:300;color:var(--tx);line-height:1.25;margin-bottom:2px}
.item-sub{font-size:12.6px;color:var(--tx3);font-weight:400}
.item-detail{max-height:0;overflow:hidden;transition:max-height .35s ease}
.tl-item.open .item-detail{max-height:400px}
.detail-in{padding-top:10px;padding-bottom:4px}
.detail-desc{font-size:15px;color:var(--tx2);font-weight:400;line-height:1.9;border-left:1px solid var(--bd2);padding-left:12px;margin-bottom:10px}
.detail-links{display:flex;gap:7px;flex-wrap:wrap}

/* ── GUESTBOOK ── */
.gb-form{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
.gb-row{display:flex;gap:9px}
.gb-input,.gb-sel,.gb-ta{font-family:'Noto Serif KR',serif;font-weight:400;font-size:15.6px;border:.5px solid var(--bd);background:var(--bg);color:var(--tx);padding:7px 13px;outline:none;transition:border-color .15s;width:100%}
.gb-input:focus,.gb-sel:focus,.gb-ta:focus{border-color:var(--line)}
.gb-input::placeholder,.gb-ta::placeholder{color:var(--tx3)}
.gb-input{flex:1;min-width:0}
.gb-sel{flex:1;min-width:0;cursor:pointer}
.gb-ta{resize:vertical;min-height:68px}
.gb-btn{align-self:flex-end;padding:7px 20px;font-size:13.2px;font-family:'Noto Sans KR',sans-serif;font-weight:400;background:none;border:.5px solid var(--bd);color:var(--tx2);cursor:pointer;letter-spacing:.04em;transition:all .15s}
.gb-btn:hover{border-color:var(--acc);color:var(--acc)}
.gb-list{display:flex;flex-direction:column;gap:14px}
.gb-entry{border-left:1px solid var(--bd2);padding:7px 0 7px 14px}
.gb-head{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:4px}
.gb-name{font-size:15.6px;font-weight:500;color:var(--tx)}
.gb-song{font-size:12px;color:var(--acc);border:.5px solid var(--bd2);padding:1px 7px}
.gb-date{font-size:11.4px;color:var(--tx3);margin-left:auto}
.gb-msg{font-size:15px;color:var(--tx2);font-weight:400;line-height:1.8;font-style:italic}
.gb-empty{font-size:14.4px;color:var(--tx3);font-style:italic;text-align:center;padding:18px 0}

@media(max-width:520px){
  .sec,.timeline,.filter-bar,.search-wrap{padding-left:14px;padding-right:14px}
  .gb-row{flex-direction:column}
}

/* ── NEWS ── */
.news-sec{padding:28px 28px 24px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.news-year-badge{display:inline-block;font-size:10.8px;letter-spacing:.1em;background:var(--acc);color:#fff;padding:3px 12px;margin-bottom:16px;font-family:'Noto Serif KR',serif;font-weight:400}
.news-grid{display:flex;flex-direction:column;gap:14px;margin-bottom:18px}
.news-card{display:block;text-decoration:none;border:.5px solid var(--bd);padding:14px 16px;background:var(--bg);transition:border-color .15s}
.news-card:hover{border-color:var(--acc)}
.news-card-title{font-size:15.6px;font-weight:500;color:var(--tx);line-height:1.4;margin-bottom:6px;font-family:'Noto Sans KR',sans-serif}
.news-card-desc{font-size:13.2px;color:var(--tx3);line-height:1.7;font-family:'Noto Sans KR',sans-serif;font-weight:300}
.news-card-meta{font-size:11.4px;color:var(--tx3);margin-bottom:5px;font-family:'Noto Sans KR',sans-serif;font-weight:300}
.news-card-meta em{color:var(--acc);font-style:normal}
.news-card-date{font-size:11px;color:var(--tx3);margin-top:7px;font-family:'Noto Sans KR',sans-serif}
.news-lib-btn{display:inline-flex;align-items:center;gap:7px;font-size:13.2px;color:var(--tx2);border:.5px solid var(--bd);padding:8px 16px;text-decoration:none;font-family:'Noto Sans KR',sans-serif;font-weight:400;transition:all .15s}
.news-lib-btn:hover{border-color:var(--acc);color:var(--acc)}
.news-loading{font-size:13.2px;color:var(--tx3);padding:16px 0;font-family:'Noto Sans KR',sans-serif}
.news-err{font-size:13.2px;color:var(--tx3);font-style:italic;padding:10px 0}
.news-empty{font-size:13.2px;color:var(--tx3);font-style:italic;padding:10px 0}
.news-lib-year{font-size:12px;color:var(--tx3);font-family:'Noto Sans KR',sans-serif;font-weight:300}
@media(max-width:520px){.news-sec{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<div id="app">

<!-- HERO -->
<div class="hero">
  <div class="hero-badge">트로트의 여왕 · 연대기 아카이브</div>
  <h1>주현미</h1>
  <div class="hero-romanized">周炫美 · Joo Hyun-Mi</div>
  <div class="deco"><hr><div class="deco-dot"></div><div class="deco-dot"></div><div class="deco-dot"></div><hr></div>
  <div class="hero-meta">음력 1961년 9월 27일 (양력 1961년 11월 5일) 생 &nbsp;·&nbsp; 데뷔 1985년 &nbsp;·&nbsp; 정규 20집 &nbsp;·&nbsp; 2025년 데뷔 40주년</div>
</div>

<!-- NEWS -->
<div class="news-sec" id="news-sec">
  <div class="sec-title">주현미 뉴스</div>
  <div id="news-year-badge"></div>
  <div id="news-grid" class="news-grid">
    <div class="news-loading">기사 불러오는 중...</div>
  </div>
  <a id="news-lib-btn" class="news-lib-btn" href="#" target="_blank" rel="noopener" style="display:none">
    📰 네이버 뉴스 라이브러리에서 더 보기
  </a>
</div>

<!-- TODAY + COVER -->
<div class="sec">
  <div class="sec-title">n년 전 오늘의 노래</div>
  <div id="today-out"></div>

  <div class="cover-wrap">
    <div class="cover-label">오늘의 커버곡 — JooTV</div>
    <div class="video-frame">
      <div class="video-skeleton" id="cover-skeleton">영상 불러오는 중...</div>
      <iframe id="cover-iframe" src="" allowfullscreen loading="lazy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        style="opacity:0;transition:opacity .3s">
      </iframe>
    </div>
    <div class="video-meta" id="cover-title"></div>
    <div class="cover-footer">
      <button class="cover-btn" id="cover-next-btn" onclick="nextCover()" disabled>↻ 다른 영상</button>
      <span class="cover-info" id="cover-info"></span>
    </div>
    <div class="cover-err" id="cover-err"></div>
  </div>
</div>

<!-- SEARCH + FILTER -->
<div class="search-wrap">
  <input class="search-input" id="sq" placeholder="앨범, 연도, 키워드 검색…" oninput="renderTL()">
</div>
<div class="filter-bar">
  <button class="fbtn on" onclick="setF('all',this)">전체</button>
  <button class="fbtn" onclick="setF('album',this)">앨범</button>
  <button class="fbtn" onclick="setF('hit',this)">대표곡</button>
  <button class="fbtn" onclick="setF('award',this)">수상/기록</button>
  <button class="fbtn" onclick="setF('1980s',this)">1980s</button>
  <button class="fbtn" onclick="setF('1990s',this)">1990s</button>
  <button class="fbtn" onclick="setF('2000s',this)">2000s+</button>
</div>

<div class="timeline" id="tl"></div>

<!-- GUESTBOOK -->
<div class="sec" style="border-top:.5px solid var(--bd)">
  <div class="sec-title">팬 방명록</div>
  <div class="gb-form">
    <div class="gb-row">
      <input class="gb-input" id="gb-name" placeholder="닉네임" maxlength="20">
      <select class="gb-sel" id="gb-song">
        <option value="">— 좋아하는 노래 —</option>
        <option>비내리는 영동교</option><option>눈물의 블루스</option>
        <option>신사동 그 사람</option><option>짝사랑</option><option>잠깐만</option>
        <option>추억으로 가는 당신</option><option>또 만났네요</option>
        <option>울면서 후회하네</option><option>쌍쌍파티</option>
        <option>사랑한다</option><option>짜라자짜</option>
        <option>여인의 눈물</option><option>러브레터</option>
      </select>
    </div>
    <textarea class="gb-ta" id="gb-msg" placeholder="선생님 노래에 얽힌 추억을 남겨주세요 ✦" maxlength="200"></textarea>
    <button class="gb-btn" onclick="gbSubmit()">✦ 방명록 남기기</button>
  </div>
  <div class="gb-list" id="gb-list"></div>
</div>

</div><!-- /app -->

<script>
/* ═══════════════════════════════════════════════════════
   유튜브 API 목록 가져오기 & 랜덤 추천 로직
═══════════════════════════════════════════════════════ */
let covers = []; // 서버에서 받아온 영상 목록 저장용

async function loadCovers() {
  try {
    // 1. Vercel 서버리스 함수(/api/covers)에 데이터 요청
    const res = await fetch('/api/covers');

    if (!res.ok) {
      const errData = await res.json();
      throw new Error(errData.error || '서버 응답 오류');
    }

    covers = await res.json(); // [{id, title}, ...] 형태의 배열

    if (covers && covers.length > 0) {
      // 2. 가져온 목록 중 랜덤하게 하나 선택 (새로고침 시 매번 바뀜)
      const randomIdx = Math.floor(Math.random() * covers.length);
      showCover(randomIdx);

      // '다른 노래 추천' 버튼 활성화
      const btn = document.getElementById('cover-next-btn');
      if (btn) btn.disabled = false;
    } else {
      throw new Error('검색된 영상이 없습니다.');
    }
  } catch (e) {
    console.error('API 에러:', e);
    const errEl = document.getElementById('cover-err');
    if (errEl) errEl.textContent = '영상을 불러오지 못했습니다: ' + e.message;
    const skel = document.getElementById('cover-skeleton');
    if (skel) skel.style.display = 'none';
  }
}

// 특정 인덱스의 영상을 화면에 표시
function showCover(idx) {
  const v = covers[idx];
  const iframe   = document.getElementById('cover-iframe');
  const skeleton = document.getElementById('cover-skeleton');
  const titleEl  = document.getElementById('cover-title');
  const infoEl   = document.getElementById('cover-info');

  if (skeleton) skeleton.style.display = 'none';
  if (iframe) {
    iframe.src = `https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1&autoplay=0`;
    iframe.style.opacity = '1';
  }
  if (titleEl) titleEl.textContent = v.title;
  if (infoEl)  infoEl.textContent  = `오늘의 추천 영상 (${idx + 1} / ${covers.length})`;
}

// '다른 노래 보기' 버튼 클릭 시 — 중복 없이 순환
let shownIdxSet = new Set();
function nextCover() {
  if (covers.length === 0) return;
  // 전부 봤으면 초기화
  if (shownIdxSet.size >= covers.length) shownIdxSet.clear();
  // 아직 안 본 것 중 랜덤
  let next;
  do { next = Math.floor(Math.random() * covers.length); }
  while (shownIdxSet.has(next));
  shownIdxSet.add(next);
  showCover(next);
}

// 페이지 로드 시 실행
loadCovers();

/* ═══════════════════════════════════════════════════════

/* TODAY 우선순위 로직 */

async function loadTodayVideo(title) {
  const area = document.getElementById('today-embed-area');
  if (!area) return;
  area.innerHTML = '<div class="today-embed-loading">영상 불러오는 중...</div>';
  try {
    const q = encodeURIComponent('주현미 ' + title);
    const r = await fetch('/api/today-video?q=' + q);
    if (!r.ok) throw new Error();
    const d = await r.json();
    if (!d.id) throw new Error();
    area.innerHTML =
      '<div class="video-frame"><iframe src="https://www.youtube.com/embed/' + d.id +
      '?rel=0&modestbranding=1" allowfullscreen loading="lazy" ' +
      'allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture">' +
      '</iframe></div>';
  } catch (e) {
    area.innerHTML = '';
  }
}

function initToday() {
  const now = new Date(), tm = now.getMonth() + 1, td = now.getDate();
  const valid = SONGS.filter(s => s.month && s.day);

  function dist(s) {
    const raw = Math.abs((s.month - tm) * 30 + (s.day - td));
    return Math.min(raw, 365 - raw);
  }

  let pick = null, prio = 0, minD = 9999, closest = null;
  for (const s of valid) {
    const d = dist(s);
    if (d < minD) { minD = d; closest = s; }
    const exact = s.month === tm && s.day === td;
    if      (exact          && prio < 3) { pick = s; prio = 3; }
    else if (d <= 7         && prio < 2) { pick = s; prio = 2; }
    else if (s.month === tm && prio < 1) { pick = s; prio = 1; }
  }
  if (!pick) { pick = closest; prio = 0; }

  const ago = now.getFullYear() - pick.year;
  const mm  = String(pick.month).padStart(2,'0');
  const dd  = String(pick.day).padStart(2,'0');
  const labels = { 3:'★ 오늘 날짜 일치', 2:'이번 주 (7일 이내)', 1:'이번 달', 0:'가장 가까운 날짜' };
  const cls    = { 3:'p1', 2:'p2', 1:'p3', 0:'p3' };
  const ytQ    = encodeURIComponent('주현미 ' + pick.title);

  let html = '<span class="p-badge ' + cls[prio] + '">' + labels[prio] + '</span>';
  html += '<div class="today-song">〈' + pick.title + '〉</div>';
  html += '<div class="today-info">발매일 ' + pick.year + '.' + mm + '.' + dd + ' &nbsp;/&nbsp; ' + ago + '년 전</div>';
  if (pick.lyric) html += '<div class="today-lyric">❝ ' + pick.lyric + ' ❞</div>';
  if (pick.album) html += '<div class="today-album">📀 ' + pick.album + '</div>';
  html += '<div class="link-row" style="margin-bottom:14px">';
  html += '<a class="mlink" href="https://www.youtube.com/results?search_query=' + ytQ + '" target="_blank">▶ YouTube에서 검색</a>';
  html += '</div>';
  html += '<div id="today-embed-area" class="today-embed-area"></div>';

  document.getElementById('today-out').innerHTML = html;
  loadTodayVideo(pick.title);
}

let curF = 'all';
const TAG = { album:'앨범', hit:'대표곡', award:'수상/기록' };
const ERA = { '1980s':'1980s', '1990s':'1990s', '2000s':'2000s+' };

function setF(f, btn) {
  curF = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); renderTL();
}
function renderTL() {
  const q = document.getElementById('sq').value.toLowerCase();
  const c = document.getElementById('tl'); c.innerHTML = '';
  ['1980s','1990s','2000s'].forEach(era => {
    const items = TL.filter(d => {
      const mE = curF==='all' || curF===d.type || curF===d.era;
      const mQ = !q || d.title.toLowerCase().includes(q) || String(d.year).includes(q) ||
                 (d.sub||'').toLowerCase().includes(q) || (d.desc||'').toLowerCase().includes(q);
      return mE && mQ && d.era === era;
    });
    if (!items.length) return;
    const g = document.createElement('div'); g.className='era-group';
    g.innerHTML = `<div class="era-label">${ERA[era]}</div>`;
    items.forEach(d => {
      const el = document.createElement('div'); el.className='tl-item';
      el.innerHTML = `
        <div class="item-yr">${d.year}</div>
        <div class="item-spine"><div class="spine-dot"></div><div class="spine-line"></div></div>
        <div class="item-body">
          <span class="item-tag ${d.type}">${TAG[d.type]}</span>
          <div class="item-title">${d.title}</div>
          <div class="item-sub">${d.sub||''}</div>
          <div class="item-detail"><div class="detail-in">
            <div class="detail-desc">${d.desc||''}</div>
            <div class="detail-links">
              ${d.yt?`<a class="mlink" href="${d.yt}" target="_blank">▶ YouTube</a>`:''}
              ${d.ml?`<a class="mlink" href="${d.ml}" target="_blank">♬ 멜론</a>`:''}
            </div>
          </div></div>
        </div>`;
      el.addEventListener('click', () => {
        const was = el.classList.contains('open');
        document.querySelectorAll('.tl-item.open').forEach(e => e.classList.remove('open'));
        if (!was) el.classList.add('open');
      });
      g.appendChild(el);
    });
    c.appendChild(g);
  });
}

/* GUESTBOOK */
const GBK = 'juhyunmi_gb_v4';
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gbL = () => { try { return JSON.parse(localStorage.getItem(GBK)||'[]'); } catch(e){return[];} };
const gbS = a => { try { localStorage.setItem(GBK, JSON.stringify(a)); } catch(e){} };

function gbSubmit() {
  const name = document.getElementById('gb-name').value.trim();
  const song = document.getElementById('gb-song').value;
  const msg  = document.getElementById('gb-msg').value.trim();
  if (!name || !msg) { alert('닉네임과 메시지를 입력해주세요.'); return; }
  const a = gbL();
  a.unshift({ name, song, msg, date: new Date().toLocaleDateString('ko-KR') });
  gbS(a);
  document.getElementById('gb-name').value = '';
  document.getElementById('gb-song').value = '';
  document.getElementById('gb-msg').value  = '';
  renderGB();
}
function renderGB() {
  const w = document.getElementById('gb-list'); const a = gbL();
  if (!a.length) { w.innerHTML='<div class="gb-empty">첫 번째 방명록을 남겨보세요 ✦</div>'; return; }
  w.innerHTML = a.map(e => `
    <div class="gb-entry">
      <div class="gb-head">
        <span class="gb-name">${esc(e.name)}</span>
        ${e.song?`<span class="gb-song">♪ ${esc(e.song)}</span>`:''}
        <span class="gb-date">${e.date}</span>
      </div>
      <div class="gb-msg">${esc(e.msg)}</div>
    </div>`).join('');

/* ═══════════════════════════════════════════════════════

function loadNews() {
  const now  = new Date();
  const mm   = String(now.getMonth() + 1).padStart(2, '0');
  const dd   = String(now.getDate()).padStart(2, '0');
  const today = mm + '-' + dd; // "03-22"

  // 1. 오늘 월+일과 정확히 일치하는 기사 (연도 무관)
  let matched = NEWS_DB.filter(a => a.d.slice(5).replace('.', '-') === today);

  // 2. 없으면 ±7일 이내
  if (matched.length === 0) {
    const todayNum = now.getMonth() * 30 + now.getDate();
    matched = NEWS_DB.filter(a => {
      const am = parseInt(a.d.slice(5, 7)) - 1;
      const ad = parseInt(a.d.slice(8));
      const diff = Math.abs(am * 30 + ad - todayNum);
      return Math.min(diff, 360 - diff) <= 7;
    });
  }

  // 3. 그래도 없으면 같은 달
  if (matched.length === 0) {
    matched = NEWS_DB.filter(a => a.d.slice(5, 7) === mm);
  }

  // 4. 그래도 없으면 전체에서 날짜 가장 가까운 것
  if (matched.length === 0) {
    const todayNum = now.getMonth() * 30 + now.getDate();
    matched = [...NEWS_DB].sort((a, b) => {
      const da = Math.abs((parseInt(a.d.slice(5,7))-1)*30 + parseInt(a.d.slice(8)) - todayNum);
      const db = Math.abs((parseInt(b.d.slice(5,7))-1)*30 + parseInt(b.d.slice(8)) - todayNum);
      return da - db;
    }).slice(0, 3);
  }

  // 연도 다양하게 — 같은 연도 중복 최소화, 최대 3건
  matched.sort((a, b) => a.d.localeCompare(b.d));
  // 연도별 1건씩 우선 선택
  const byYear = {};
  for (const a of matched) {
    const y = a.d.slice(0, 4);
    if (!byYear[y]) byYear[y] = a;
  }
  const picks = Object.values(byYear).slice(0, 3);
  // 3건 안 되면 나머지로 채움
  if (picks.length < 3) {
    for (const a of matched) {
      if (picks.length >= 3) break;
      if (!picks.includes(a)) picks.push(a);
    }
  }

  renderNews(picks);
}

function renderNews(items) {
  const grid   = document.getElementById('news-grid');
  const badge  = document.getElementById('news-year-badge');
  const libBtn = document.getElementById('news-lib-btn');
  const now    = new Date();
  const mm     = String(now.getMonth() + 1).padStart(2, '0');
  const dd     = String(now.getDate()).padStart(2, '0');

  if (!items || items.length === 0) {
    badge.innerHTML = '';
    grid.innerHTML  = '<div class="news-empty">오늘 날짜 기사를 찾을 수 없습니다.</div>';
    return;
  }

  // 배지: 기사들의 연도 표시
  const years = [...new Set(items.map(a => a.d.slice(0, 4)))].sort();
  const thisYear = now.getFullYear();
  const agoList  = years.map(y => thisYear - parseInt(y) + '년 전').join(' · ');
  badge.innerHTML = '<span class="news-year-badge">📰 ' + agoList + '</span>';

  grid.innerHTML = items.map(a => {
    const ago  = thisYear - parseInt(a.d.slice(0, 4));
    const ymd  = a.d.replace(/\./g, '. ');
    // 네이버 뉴스 라이브러리 원문 링크 (해당 날짜)
    const [y, mo, dy] = a.d.split('.');
    const libUrl = 'https://newslibrary.naver.com/search/searchByDate.naver?' +
      'searchType=1&query=%EC%A3%BC%ED%98%84%EB%AF%B8' +
      '&startDate=' + y + '-' + mo + '-' + dy +
      '&endDate='   + y + '-' + mo + '-' + dy;
    return '<a class="news-card" href="' + libUrl + '" target="_blank" rel="noopener">' +
      '<div class="news-card-meta">' + ymd + ' &nbsp;·&nbsp; ' + a.p + ' &nbsp;·&nbsp; <em>' + ago + '년 전</em></div>' +
      '<div class="news-card-title">' + a.t + '</div>' +
      (a.s ? '<div class="news-card-desc">' + a.s + '</div>' : '') +
      '</a>';
  }).join('');

  // 하단 버튼: 오늘 날짜로 라이브러리 전체 검색
  const libAllUrl = 'https://newslibrary.naver.com/search/searchByKeyword.naver#' +
    encodeURIComponent(JSON.stringify({
      mode:1, sort:0, trans:1, pageSize:10, keyword:'주현미',
      startDate:'1920-01-01', endDate:'1999-12-31'
    }));
  libBtn.href = libAllUrl;
  libBtn.textContent = '📰 네이버 뉴스 라이브러리에서 더 보기';
  libBtn.style.display = 'inline-flex';
}
